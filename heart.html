<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Heart Live Voice Assistant</title>
  <style>
    :root {
      --bg: #7b0f23;
      --accent: #ff3b30;
    }
    html, body {
      height: 100%;
      margin: 0;
      font-family: Inter, system-ui, Arial;
      background: linear-gradient(180deg, var(--bg), #5a0713);
      color: #fff;
    }
    .overlay {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .assistant {
      width: 100%;
      max-width: 2400px;
      height: 100%;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-left, .top-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: transform .15s;
    }
    .icon-btn:active { transform: scale(.9); }
    .icon-btn svg { width: 20px; height: 20px; fill: #fff; }

    .heart-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 60px;
    }
    .heart {
      width: 160px;
      height: 160px;
      position: relative;
      transform: rotate(-45deg);
      background: var(--accent);
      border-radius: 16px;
      animation: beat 1200ms infinite;
      box-shadow: 0 12px 40px rgba(255, 59, 48, 0.25), 0 2px 8px rgba(0, 0, 0, 0.4);
    }
    .heart::before, .heart::after {
      content: "";
      width: 160px;
      height: 160px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
    }
    .heart::before { top: -80px; left: 0; }
    .heart::after { left: 80px; top: 0; }
    @keyframes beat {
      0% { transform: rotate(-45deg) scale(1); }
      25% { transform: rotate(-45deg) scale(1.12); }
      40% { transform: rotate(-45deg) scale(1); }
      65% { transform: rotate(-45deg) scale(1.08); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    .controls {
      position: absolute;
      bottom: 40px;
      width: 100%;
      left: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
      box-sizing: border-box;
    }
    .ctrl-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
      transition: transform .12s;
    }
    .ctrl-btn:active { transform: scale(.96); }
    .ctrl-btn svg { width: 30px; height: 30px; fill: #fff; }

    .center-record {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 12px 30px rgba(255, 59, 48, 0.3), inset 0 -6px 10px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-8px);
    }

    .status {
      position: absolute;
      bottom: 150px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      width: 100%;
    }

    #downArrow {
      position: fixed;
      bottom: 120px;
      right: 30px;
      font-size: 28px;
      cursor: pointer;
      z-index: 1000;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      padding: 6px 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }
    #downArrow:hover { transform: scale(1.2); }

    @media(max-width:768px) {
      .assistant { max-width: 540px; }
      #downArrow { bottom: 100px; right: 20px; font-size: 24px; }
      .status { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="assistant">
      <div class="topbar">
        <div class="top-left">
          <a href="dashboard.html" class="icon-btn" title="Back">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </a>
        </div>
        <div class="top-right">
          <button class="icon-btn" title="Captions">
            <svg viewBox="0 0 24 24"><path d="M21 4H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-11 9H6v-2h4v2zm9 0h-4v-2h4v2z"/></svg>
          </button>
          <button class="icon-btn" title="Speaker">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M14.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.74 2.5-2.26 2.5-4.02z"/></svg>
          </button>
          <button class="icon-btn" title="Choose Voice">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </button>
        </div>
      </div>

      <div class="heart-wrap">
        <div id="heart" class="heart"></div>
      </div>

      <div class="status" id="status">Tap the heart or mic to talk</div>

            <div class="controls">
        <!-- Left Button -->
        <button class="ctrl-btn" title="Settings">
          <svg viewBox="0 0 24 24">
            <path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.03-.66-.07-.98l2.11-1.65a.51.51 0 0 0 .12-.66l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.05 7.05 0 0 0-1.7-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.63.24-1.2.56-1.7.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46c-.14.22-.09.52.12.66l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98L2.46 14.63a.51.51 0 0 0-.12.66l2 3.46c.14.22.4.3.61.22l2.49-1c.5.42 1.07.75 1.7.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.63-.23 1.2-.56 1.7-.98l2.49 1c.21.09.47 0 .61-.22l2-3.46a.51.51 0 0 0-.12-.66l-2.11-1.65zM12 15.6c-1.98 0-3.6-1.61-3.6-3.6s1.61-3.6 3.6-3.6 3.6 1.61 3.6 3.6-1.62 3.6-3.6 3.6z"/>
          </svg>
        </button>

        <!-- Center Mic Button -->
        <button class="center-record" title="Talk">
          <svg viewBox="0 0 24 24">
            <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"/>
            <path d="M19 11v1a7 7 0 0 1-14 0v-1"/>
            <path d="M12 19v3"/>
          </svg>
        </button>

        <!-- Right Button -->
        <button class="ctrl-btn" title="Stop">
          <svg viewBox="0 0 24 24">
            <path d="M6 6h12v12H6z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
 <script>
document.addEventListener("DOMContentLoaded", () => {
  const statusEl = document.getElementById("status");
  const heart = document.getElementById("heart");
  const micBtn = document.querySelector(".center-record");
  const downArrow = document.getElementById("downArrow");

  const ccBtn = document.querySelector('[title="Captions"]');
  const speakerBtn = document.querySelector('[title="Speaker"]');
  const voiceBtn = document.querySelector('[title="Choose Voice"]');

  let captionsOn = false;
  let speakerOn = true;
  let selectedVoice = null;

  // 🔊 Voice function
  function speak(text) {
    if (!window.speechSynthesis) return;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.pitch = 1.1;
    utterance.rate = 1;
    utterance.volume = 1;

    const voices = window.speechSynthesis.getVoices();
    if (selectedVoice) {
      utterance.voice = selectedVoice;
    }

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  // 💓 Heart tap
  heart.addEventListener("click", () => {
    statusEl.textContent = "❤️ Heart tapped — Listening live...";
    speak("Hello Venkata, I'm listening with love.");
    pulse();
  });

  // 🎤 Mic tap
  micBtn.addEventListener("click", () => {
    statusEl.textContent = "🎤 Mic tapped — Listening...";
    speak("Microphone activated. Speak your heart.");
    pulse();
  });

  // ⬇ Scroll arrow
  downArrow.addEventListener("click", () => {
    window.scrollTo({
      top: document.documentElement.scrollHeight,
      behavior: "smooth"
    });
  });

  // 🫀 Pulse animation
  function pulse() {
    heart.style.animation = "beat 600ms infinite";
    setTimeout(() => {
      heart.style.animation = "beat 1200ms infinite";
      statusEl.textContent = "Tap the heart or mic to talk";
    }, 3000);
  }

  // 🗨️ Captions toggle
  ccBtn.addEventListener("click", () => {
    captionsOn = !captionsOn;
    statusEl.textContent = captionsOn ? "Captions enabled" : "Captions disabled";
  });

  // 🔇 Speaker toggle
  speakerBtn.addEventListener("click", () => {
    speakerOn = !speakerOn;
    statusEl.textContent = speakerOn ? "Speaker unmuted 🔊" : "Speaker muted 🔇";
  });

  // 🎙️ Voice selection
  voiceBtn.addEventListener("click", () => {
    const choice = prompt("Choose voice: Male or Female?");
    const voices = window.speechSynthesis.getVoices();

    if (choice) {
      const match = voices.find(v =>
        choice.toLowerCase() === "female"
          ? v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("samantha") || v.name.toLowerCase().includes("google")
          : v.name.toLowerCase().includes("male") || v.name.toLowerCase().includes("daniel") || v.name.toLowerCase().includes("google")
      );

      if (match) {
        selectedVoice = match;
        statusEl.textContent = `Voice set to: ${match.name}`;
      } else {
        statusEl.textContent = "Voice not found. Try again.";
      }
    }
  });

  // 🛎️ Load voices (some browsers need this)
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.getVoices();
    };
  }
});
</script>
</body>
</html>
